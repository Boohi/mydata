name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  docs-sanity:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify required docs exist
        run: |
          test -f AGENTS.md
          test -f CLAUDE.md
          test -f docs/privacy-promise.md
          test -f docs/architecture.md
          test -f docs/build.md
          test -f docs/github-project-management.md
          test -f LICENSE
          test -f README.md
          test -f SECURITY.md
          echo "All required docs present."

  link-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Find dead relative links in markdown
        run: |
          set -e
          fail=0
          while IFS= read -r -d '' f; do
            # Strip fenced code blocks (``` ... ```) before extracting links.
            stripped=$(awk '/^```/{f=!f; next} !f' "$f")
            while IFS= read -r link; do
              path="${link%%#*}"
              [[ -z "$path" ]] && continue
              [[ "$path" =~ ^https?:// ]] && continue
              [[ "$path" =~ ^mailto: ]] && continue
              dir=$(dirname "$f")
              target="$dir/$path"
              if [[ ! -e "$target" ]]; then
                echo "DEAD: $f -> $link"
                fail=1
              fi
            done < <(echo "$stripped" | grep -oE '\]\([^)]+\)' | sed 's/^](\(.*\))/\1/')
          done < <(find . -name '*.md' -not -path './node_modules/*' -not -path './.git/*' -print0)
          exit $fail

  node:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run format:check

  swift:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Swift version
        run: swift --version
      - name: Test MydataIPC
        run: swift test --package-path packages/schema/Swift
      - name: Test extension
        run: swift test --package-path apps/extension
      - name: Test daemon
        run: swift test --package-path apps/daemon

  privacy-paranoia:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
      - name: Verify unshare is available
        run: unshare --help >/dev/null
      - name: Run privacy paranoia harness
        run: |
          node tests/privacy-paranoia/run.mjs
          node --test tests/privacy-paranoia/run.test.mjs
